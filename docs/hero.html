<!doctype html>
<!-- Source for docs/hero.png — render with scripts/launcher/render_hero.py (headless
     Chrome at 2x) whenever the branding changes. Vector logo = always crisp. -->
<html lang="en"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:470px;background:#05080f}
  .hero{position:relative;width:1200px;height:470px;overflow:hidden;background:#05080f;
    background-image:
      radial-gradient(1150px 580px at 72% 16%, rgba(29,78,216,.22), transparent 62%),
      radial-gradient(920px 520px at 20% 94%, rgba(56,189,248,.10), transparent 60%);
    font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
  .logo{filter:drop-shadow(0 14px 34px rgba(6,16,34,.7))}
  .word{font-size:66px;font-weight:700;letter-spacing:-.015em;color:#e8eef7;line-height:1}
  .word b{font-weight:700;color:#38bdf8}
  .tag{font-size:20px;color:#8ba1c0;letter-spacing:.005em}
  .rule{width:138px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,transparent,#3b82f6 35%,#38bdf8 65%,transparent)}
  .caption{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#5d7295;font-weight:500}
  .caption b{color:#7cc6f0;font-weight:600}
</style></head><body>
<div class="hero">
  <svg class="logo" width="120" height="120" viewBox="0 0 64 64" fill="none">
    <defs>
      <linearGradient id="s" x1="18" y1="18" x2="46" y2="46" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#3f7bf6"/></linearGradient>
      <linearGradient id="b" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#0c1526"/><stop offset="1" stop-color="#16233f"/></linearGradient>
    </defs>
    <rect width="64" height="64" rx="14" fill="url(#b)"/>
    <g stroke="#3a5488" stroke-width="2.1" stroke-linecap="round">
      <path d="M9 18v-5.5a3.5 3.5 0 0 1 3.5-3.5H18"/><path d="M46 9h5.5A3.5 3.5 0 0 1 55 12.5V18"/>
      <path d="M55 46v5.5a3.5 3.5 0 0 1-3.5 3.5H46"/><path d="M18 55h-5.5A3.5 3.5 0 0 1 9 51.5V46"/></g>
    <path d="M22.5 21 V33.5 A9.5 9.5 0 0 0 41.5 33.5 V21" stroke="url(#s)" stroke-width="5.6" stroke-linecap="round"/>
    <g><circle cx="22.5" cy="21" r="4.4" fill="#38bdf8" opacity=".35"/><circle cx="22.5" cy="21" r="2.8" fill="#eaf7ff"/></g>
    <g><circle cx="41.5" cy="21" r="4.4" fill="#38bdf8" opacity=".35"/><circle cx="41.5" cy="21" r="2.8" fill="#eaf7ff"/></g>
    <g><circle cx="32" cy="43" r="4.4" fill="#38bdf8" opacity=".35"/><circle cx="32" cy="43" r="2.8" fill="#eaf7ff"/></g>
  </svg>
  <div class="word">Under<b>study</b></div>
  <div class="tag">Direct AI video with a rough take</div>
  <div class="rule"></div>
</div>
</body></html>
